<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="icp_autorun">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>icp_autorun</title>
  <link rel="manifest" href="manifest.json">

  <!-- R-3: vendored quickjs-emscripten singlefile-browser build (WASM inlined
       as base64 — no separate .wasm fetch). Loaded as a module so it can use
       ESM imports internally; it installs globalThis.__quickjsEmscripten,
       which lib/rust/web/quickjs_engine.dart reads via dart:js_interop. The
       WASM instantiate is kicked off here (async), so by the time Dart awaits
       __quickjsEmscripten.modulePromise, loading is already in flight. -->
  <script type="module" src="vendor/quickjs/quickjs_emscripten.bundle.js"></script>
  <!-- R-3b: vendored agent-js (pure JS, no WASM) for browser-side IC canister
       calls. Installs globalThis.__icpCcAgent (createAnonymousAgent / query /
       decodeText), read by lib/rust/web/ic_agent_engine.dart. Lazily kicked
       off here (async); Dart awaits the global in WebIcAgent.bootstrap(). The
       agent routes through the backend CORS proxy (/api/v1/ic) so the browser
       never calls ic0.app directly (no CORS). -->
  <script type="module" src="vendor/ic_agent/ic_agent.bundle.js"></script>
  <!-- Passkeys Web SDK (Corbado flutter-passkeys). Installs the global
       `PasskeyAuthenticator` object that the `passkeys` package's web plugin
       (PasskeysWeb.registerWith) probes for at boot. Without this script the
       plugin throws at boot and the app never renders. Built as an IIFE (NOT a
       module) so the `var PasskeyAuthenticator` assignment lands on the global
       scope where dart:js_interop can reach it. Built from the exact source
       shipped in passkeys_web-2.9.1 (javascript/src/, rollup → IIFE). -->
  <script src="vendor/passkeys/passkeys.bundle.js"></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
