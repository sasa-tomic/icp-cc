name: CI

on:
  push:
  pull_request:

# Shared defaults — keep jobs fast and failures diagnosable.
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# ─────────────────────────────────────────────────────────────────────────────
# Per R-3 (PROD_READINESS_PLAN.md): Linux-only CI. No OS matrix.
# Per R-1: NO web job — Flutter Web is deferred (dart:ffi unconditional import).
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── Rust: fmt + clippy (-D warnings) + nextest across the workspace ─────────
  # Covers both members: icp_core (crates/icp_core) + icp-marketplace-api (backend).
  rust:
    name: Rust (fmt + clippy + nextest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo nextest
        run: cargo nextest run --workspace

  # ── SDK: vitest across the npm workspaces + dependency allowlist ────────────
  # Root `npm test` runs `vitest run`, which picks up marketplace-sdk and
  # create-marketplace-script test files. Node 22 is required: the repo has
  # `.npmrc: engine-strict=true` and `engines.node >=22`, so Node 20 fails ci.
  sdk:
    name: SDK (vitest + check:deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run check:deps

  # ── Flutter: analyze + build native lib + run tests on Linux desktop ────────
  # Builds the Rust cdylib via `just linux` (cargo build --release of icp_core,
  # then flutter build linux) so the FFI .so is in place for tests. The dev API
  # server is required: integration tests use ApiServiceManager, which hard-fails
  # (NO fallbacks, per AGENTS.md) when MARKETPLACE_API_PORT is unset/unreachable.
  flutter:
    name: Flutter (analyze + test on Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # `just linux` and `just api-dev-up` both drive cargo, so the Rust
      # toolchain + cache must be available here too.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libssl-dev lsof

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: flutter pub get
        run: flutter pub get
        working-directory: apps/autorun_flutter

      - name: flutter analyze
        run: flutter analyze
        working-directory: apps/autorun_flutter

      - name: Build native library (just linux)
        run: just linux

      - name: Start dev API server (just api-dev-up)
        run: |
          just api-dev-up
          # api-dev-up writes "export MARKETPLACE_API_PORT=NNNN" here.
          # shellcheck disable=SC1091
          source .just-tmp/api-env.sh
          echo "MARKETPLACE_API_PORT=$MARKETPLACE_API_PORT" >> "$GITHUB_ENV"

      - name: flutter test
        run: flutter test --concurrency=4 --timeout=360s
        working-directory: apps/autorun_flutter

      - name: Stop dev API server (just api-dev-down)
        if: always()
        run: just api-dev-down
