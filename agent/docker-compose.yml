services:
  agent:
    build:
      context: ..
      dockerfile: agent/Dockerfile
    image: icp-cc-agent:latest
    # Run with docker group to access the socket
    group_add:
      - ${DOCKER_GID:-999}
    # Run as host user (UID 1000 = ubuntu): files created on bind mounts are
    # never root-owned (root-owned target/ was the bug). No gosu/chown needed.
    user: "1000:1000"
    entrypoint: ["/tini", "--", "/home/ubuntu/entrypoint.sh"]
    environment:
      # Development environment variables
      - RUST_LOG=info
      - RUST_BACKTRACE=1
      - HOME=/home/ubuntu
      - VIRTUAL_ENV=/home/ubuntu/.venv
      # All permissions inside the container only; host opencode is unaffected
      # (a project-local opencode.json would leak to the host via bind mount).
      - "OPENCODE_CONFIG_CONTENT={\"permission\":\"allow\"}"
      # Android SDK/NDK — NDK auto-detected by scripts/common.sh::setup_android_ndk_env
      - ANDROID_HOME=/home/ubuntu/Android/Sdk
      - ANDROID_SDK_ROOT=/home/ubuntu/Android/Sdk
      # Omnigent host registration (see agent/entrypoint.sh). The container
      # auto-registers as a host with this server on start.
      - OMNIGENT_SERVER_URL=http://192.168.0.2:6767
      - OMNIGENT_AUTO_REGISTER=1
    volumes:
      # Mount the entire repository directory to /code
      - ..:/code/icp-cc
      # Use container-local target/ dir to avoid conflicts between concurrent agents
      # Volume name includes project name (-p flag) so each agent gets its own
      - target-cache:/code/icp-cc/target
      # Android SDK + NDK from host (read-only). scripts/common.sh auto-detects
      # ${ANDROID_HOME}/ndk/* and sets CC_*/AR_* for cross-compile (incl. rquickjs bindgen).
      - ${HOME}/Android:/home/ubuntu/Android:ro
      # Mount some other configuration from home directory
      - ${HOME}/.claude.json:/home/ubuntu/.claude.json
      - ${HOME}/.claude:/home/ubuntu/.claude
      - ${HOME}/.happy:/home/ubuntu/.happy
      - ${HOME}/.opencode:/home/ubuntu/.opencode
      - ${HOME}/.config/opencode:/home/ubuntu/.config/opencode
      - ${HOME}/.local/share/opencode:/home/ubuntu/.local/share/opencode
      # Cache volumes for rust tooling and dependencies (controlled by ubuntu user)
      - rustup-cache:/usr/local/rustup
      - cargo-cache:/home/ubuntu/.cargo
      - home-cache:/home/ubuntu/.cache
      # Persist pub cache so pub deps (vector_math, etc.) survive across --rm runs.
      # Without this each run re-resolves and vector_math drops out intermittently.
      - pub-cache:/home/ubuntu/.pub-cache
      # Persist Flutter engine cache (Dart SDK + artifacts, ~200MB) so it isn't
      # re-downloaded on every --rm run; also stabilizes framework pkg resolution.
      - flutter-engine-cache:/home/ubuntu/flutter/bin/cache
      # Persist Omnigent state (host identity + auth tokens from `omnigent login`)
      # so the host keeps a stable identity across --rm runs.
      - omnigent-state:/home/ubuntu/.omnigent
      # SSH key for agent access to remote nodes
      - ${HOME}/.ssh/claude-code:/tmp/claude-ssh/claude-code:ro
      - ${HOME}/.ssh/claude-code.pub:/tmp/claude-ssh/claude-code.pub:ro
      # Docker socket for running docker commands inside the container
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /code/icp-cc
    stdin_open: true
    tty: true
    ports:
      - "3000:3000"  # Flutter web development
    networks:
      - icp-cc-network

volumes:
  rustup-cache:
    driver: local
  cargo-cache:
    driver: local
  home-cache:
    driver: local
  pub-cache:
    driver: local
  flutter-engine-cache:
    driver: local
  omnigent-state:
    driver: local
  target-cache:
    driver: local

networks:
  icp-cc-network:
    driver: bridge
